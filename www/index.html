<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Mapas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        .card {
            border: 2px solid black;
            padding: 20px;
            margin: 20px;
            width: 720px;
        }

        .card h1 {
            width: 100%;
            text-align: center;
            font-size: 20pt;
        }

        .card form {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }

        .card form input,
        .card form select {
            border: none;
            background: none;
            border-bottom: 1px solid grey;
            outline: none;
        }
        .card table{
            width: 100%;
            margin-top: 20px;
        }
        #fechar_mapa_botao {
            position: fixed;
            top: 10;
            right: 10;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Cartão de Mapa de Território</h1>
        <form action="">
            <label for="form_localide">
                Localidade
                <select name="form_localide" id="form_localide"></select>
            </label>
            <label for="form_numero_territorio">
                Terri. Nº
                <input type="number" name="form_numero_territorio" id="form_numero_territorio" disabled value="1">
            </label>
        </form>
        <table id="tabela_enderecos"></table>
        <button onclick="mapaTelaCheia()">full</button>
        <button onclick="mapaNormal()" style="display: none;" id="fechar_mapa_botao">Fechar Mapa</button>
        <div id="mapa" style="height: 400px; width: 100%; margin-top: 20px;"></div>
    </div>
    <script src="www/scrips.js"></script>
    <script src="www/map.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            console.log("Página carregada!");
            inicializarMapa();
            carregarSelect();
            inicializarTabela();
        });
    </script>
    
</body>

</html>
