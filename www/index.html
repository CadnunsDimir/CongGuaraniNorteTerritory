<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Mapas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .center-content {
            display: flex;
            justify-content: center;
        }

        .card {
            border: 2px solid black;
            padding: 20px;
            max-width: 720px;
            margin: 10px;
        }

        .card h1 {
            width: 100%;
            text-align: center;
            font-size: 20pt;
        }

        .card form {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }

        .card form input,
        .card form select {
            border: none;
            background: none;
            border-bottom: 1px solid grey;
            outline: none;
        }

        .card table {
            width: 100%;
            margin-top: 20px;
            font-size: 9pt;
        }

        #fechar_mapa_botao {
            position: fixed;
            top: 10px;
            right: 10px;
        }

        dialog {
            position: fixed;
            bottom: 60px;
            z-index: 400;
            border: 1px solid grey;
            border-radius: 5px;
            padding: 10px;
        }

        dialog p {
            margin: 0;
        }

        button {
            background-color: white;
            border-radius: 2px;
            border: none;
            box-shadow: 0px 0px 4px black;
        }

        .map-button {
            display: block;
            padding: 7px;
            float: right;
            position: relative;
            top: 10px;
            right: 10px;
            z-index: 401;
        }

        .map-button.close {
            height: 45px;
            width: 45px;
            font-size: 30px;
            padding: 0;
        }

        .map-default-position {
            height: 300px;
            width: 100%;
            margin-top: 20px;
            position: relative;
        }

        .map-default-position.fullscreen {
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 0;
        }

        .marker-circulo {
            background-color: #2196F3;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 0 4px rgba(0,0,0,0.4);
        }

        .marker-circulo i {
            font-size: 14px;
        }

        .lista-enderecos-fullscreen {
            position: fixed;
            bottom: 0;
            width: 100%;
            left: 0;
            background: white;
            z-index: 1001;
            display: none;
        }

        .lista-enderecos-fullscreen button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            border-radius: 4px;
        }

        .lista-enderecos-fullscreen ul {
            list-style: none;
            width: 100%;
            max-height: 20vh;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            display: none;
        }

        .lista-enderecos-fullscreen ul li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            padding-inline: 30px;
        }

        @media screen and (max-width: 650px) {
            *{
                font-family: Arial, Helvetica, sans-serif;
            }
            .card{
                margin: 0;
                border: none;
                width: 100%;
                padding: 5px;
            }

            .card form{
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body class="center-content">
    <div class="card">
        <h1>Cartão de Mapa de Território</h1>
        <form action="">
            <label for="form_localide">
                Localidade
                <select name="form_localide" id="form_localide"></select>
            </label>
            <label for="form_numero_territorio">
                Terri. Nº
                <input type="number" name="form_numero_territorio" id="form_numero_territorio" disabled value="1">
            </label>
        </form>
        <table id="tabela_enderecos"></table>

        <div id="mapa" class="map-default-position">
            <button onclick="mapaTelaCheia()" class="map-button" id="telacheia_mapa_botao">[ &nbsp; ]</button>
            <button onclick="mapaNormal()" class="map-button close" style="display: none;"
                id="fechar_mapa_botao">✕</button>            
        </div>
        <div class="lista-enderecos-fullscreen">
            <button onclick="toggleListaFullscreen()">endereços</button>
            <ul>
            </ul>
        </div>
        <dialog id="endereco_selecionado_dialog">
            <p id="endereco_selecionado"></p>
        </dialog>
    </div>
    <script src="www/scrips.js"></script>
    <script src="www/map.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            console.log("Página carregada!");
            inicializarMapa();
            carregarSelect();
            inicializarTabela();
        });
    </script>

</body>

</html>
