<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/www/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Território Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/www/style.css">
</head>

<body class="complete-map">
    <button class="show-hidden-list" onclick="showList()">selecionar territorios</button>
    <div class="territory-card" id="lista-oculta">        
        <div id="">
            <label> 
            <input type="checkbox" name="check-all" id="check-all">
            Marcar Todos
            </label>
            <ul id="territoryList" class="territory-list"></ul>
        </div>
        
    </div>
    <div id="mapa" class="map-default-position fullscreen lock">
        <button onclick="mapaTelaCheia()" class="map-button" id="telacheia_mapa_botao">[ &nbsp; ]</button>
        <button onclick="mapaNormal()" class="map-button close" style="display: none;" id="fechar_mapa_botao">✕</button>
    </div>
    <script src="/www/scrips.js"></script>
    <script src="/www/map.js"></script>
    <script src="/www/complete-map.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            inicializarMapa();
            mountTerritoryListHtml();
        });
    </script>

</body>

</html>
